[mypy]
python_version = 3.13
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

# Paths
mypy_path = src
explicit_package_bases = true

# Import discovery
namespace_packages = true

# Relaxations para código de infraestructura
[mypy-src.infrastructure.*]
disallow_untyped_decorators = false

# Relaxations para tests
[mypy-tests.*]
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
warn_return_any = false
warn_unreachable = false

# Relaxations para schemas (Pydantic usa magia con types)
[mypy-src.shared.schemas.*]
disallow_untyped_defs = false
warn_return_any = false

# Librerías externas sin type stubs
[mypy-usipipo_commons.*]
ignore_missing_imports = True
